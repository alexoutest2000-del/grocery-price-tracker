name: Daily Scrape

on:
  schedule:
    # 6 AM Eastern = 10 AM UTC
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .
      - name: Run scraper
        run: python -m scrapers.run_all
      - name: Commit & push updated data
        run: |
          git config user.name "jarvis-bot"
          git config user.email "jarvis@openclaw.local"
          git add data/
          if git diff --staged --quiet; then
            echo "No price changes detected"
          else
            git commit -m "scrape: $(date +%Y-%m-%d) daily price update"
            git push
          fi
